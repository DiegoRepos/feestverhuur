# Server
server.port=${PORT:8080}

# Database
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Mail (Combell SMTP)
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# Admin
app.admin.username=${ADMIN_USERNAME}
app.admin.password-hash=${ADMIN_PASSWORD_HASH}

# E-mailrouting (mail forwards naar info@zyvento.be in Combell)
app.mail.offertes-address=${OFFERTES_ADDRESS:offertes@zyvento.be}
app.mail.boekingen-address=${BOEKINGEN_ADDRESS:boekingen@zyvento.be}

# Mollie
mollie.api.key=${MOLLIE_API_KEY}

# App base URL
app.base-url=${APP_BASE_URL:https://zyvento.be}
